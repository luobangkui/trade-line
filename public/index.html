        </div>` : ''}
      ${(review.improvements && review.improvements.length) ? `
        <div class="review-block">
          <div class="rb-title" style="color:#3b82f6">🔧 改进点</div>
          <ul class="rb-list">${review.improvements.map(s => `<li>${s}</li>`).join('')}</ul>
        </div>` : ''}
      ${(review.playbook_updates && review.playbook_updates.length) ? `
        <div class="review-block">
          <div class="rb-title" style="color:#06b6d4">📖 操作手册更新</div>
          <ul class="rb-list">${review.playbook_updates.map(s => `<li>${s}</li>`).join('')}</ul>
        </div>` : ''}
      ${(!review.key_takeaways?.length && !review.mistakes?.length && !review.improvements?.length) ? `
        <div class="empty-hint">暂无内容，点击右上 ✎ 编辑写入</div>
      ` : ''}
    </div>

    ${(review.next_actions && review.next_actions.length) ? `
    <div class="detail-section">
      <div class="detail-section-title">🎯 下期行动计划</div>
      <ul class="rb-list" style="padding-left:18px">${review.next_actions.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>` : ''}
  `;

  // 子周期下钻
  const childTitle = review.period_type === 'week' ? '🗓️ 该周每日明细' : '📅 该月各周明细';
  const childHtml = children && children.length ? `
    <div class="detail-section">
      <div class="detail-section-title">${childTitle}</div>
      <div class="child-list">
        ${children.map(ch => {
          const cc = scoreColor(ch.avg_score);
          return `
            <div class="child-item" onclick="drillDownChild('${ch.key}', '${review.period_type}')">
              <span class="ci-key">${ch.key}</span>
              <span class="ci-meta">${ch.ops}笔 · 契合 ${ch.alignment}%${ch.mood ? ' · ' + (ch.mood.length > 30 ? ch.mood.slice(0,30) + '…' : ch.mood) : ''}</span>
              <span class="ci-score" style="color:${cc}">${ch.avg_score || '—'}</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  ` : '';

  // 复盘日志区块
  const journalHtml = `
    <div class="detail-section journal-section">
      <div class="journal-header">
        <div class="jh-title">📒 ${VIEW_LABEL[review.period_type]}度复盘日志 ${journals.length ? `(${journals.length})` : ''}</div>
        <button class="jh-add-btn" onclick="openJournalEditModal()">+ 新建日志</button>
      </div>
      ${journals.length ? `
        <div class="journal-list">
          ${journals.map(j => {
            const t = (j.updated_at || '').slice(5, 16).replace('T', ' ');
            const summary = j.summary || (j.body ? j.body.slice(0, 80) + '…' : '');
            return `
              <div class="journal-item is-${j.status}">
                <div class="ji-head">
                  <span class="ji-status is-${j.status}">${j.status === 'final' ? '定稿' : '草稿'}</span>
                  <span class="ji-source">${j.source || 'manual'}</span>
                  <span class="ji-time">${t}</span>
                </div>
                <div class="ji-title" onclick="openJournalView('${j.id}')">${j.title}</div>
                ${summary ? `<div class="ji-summary">${escapeHtml(summary)}</div>` : ''}
                ${j.tags && j.tags.length ? `<div class="ji-tags">${j.tags.map(t => `<span class="ji-tag">${t}</span>`).join('')}</div>` : ''}
                <div class="ji-actions">
                  <button class="ji-action-btn" onclick="openJournalView('${j.id}')">查看</button>
                  <button class="ji-action-btn" onclick="openJournalEditModal('${j.id}')">编辑</button>
                  <button class="ji-action-btn danger" onclick="deleteJournalConfirm('${j.id}')">删除</button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      ` : `
        <div class="empty-hint" style="padding:14px 0">
          暂无独立日志。点击右上「+ 新建日志」自由记录，或由 agent 通过 API 写入
        </div>
      `}
    </div>
  `;

  const btnHtml = `
    <div class="detail-section" style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="detail-btn" style="flex:1;min-width:90px" onclick="reaggregatePeriod('${review.period_key}')" title="保留你写入的字段，仅重算统计">↻ 重新聚合</button>
      <button class="detail-btn" style="flex:1;min-width:90px;background:var(--accent);border-color:var(--accent);color:#fff" onclick="openPeriodEditModal()">✎ 编辑</button>
      <button class="detail-btn" style="flex:1;min-width:90px;background:transparent;border-color:#ef444466;color:#ef4444" onclick="deletePeriodConfirm()" title="物理删除该聚合复盘（含手写内容），下次访问基于最新 daily 数据从零重聚合">🗑 清空重推</button>
    </div>
  `;

  // 缓存当前 review 给模态使用
  editingPeriod = review;

  body.innerHTML = summaryHtml + insightHtml + textBlocksHtml + journalHtml + childHtml + btnHtml;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  })[c]);
}

async function reaggregatePeriod(periodKey) {
  const path = viewMode === 'week' ? 'weekly' : 'monthly';
  await fetch(`/api/review/${path}/${encodeURIComponent(periodKey)}/aggregate`, { method: 'POST' });
  await loadTimeline();
  await selectPeriod(periodKey);
}

async function deletePeriodConfirm() {
  if (!editingPeriod) return;
  const label = periodFullLabel(editingPeriod);
  const hasUserContent = (editingPeriod.improvements?.length || 0)
    + (editingPeriod.playbook_updates?.length || 0)
    + (editingPeriod.monthly_thesis ? 1 : 0)
    + ((editingPeriod.narrative && !/^(本周|本月)(无操作|共 \d+ 笔操作)/.test(editingPeriod.narrative)) ? 1 : 0);
  const warn = hasUserContent
    ? `\n\n⚠️ 该${VIEW_LABEL[editingPeriod.period_type]}已写入手写内容（narrative / 改进 / 手册等），将一并清空！`
    : '';
  if (!confirm(`确定清空 ${label} 的聚合复盘吗？${warn}\n\n• 仅删除聚合记录，daily / operations / journals 不受影响\n• 下次访问会基于最新数据自动重新聚合（纯自动版本）`)) return;

  const path = editingPeriod.period_type === 'week' ? 'weekly' : 'monthly';
  await fetch(`/api/review/${path}/${encodeURIComponent(editingPeriod.period_key)}?reaggregate=1`, { method: 'DELETE' });
  closePeriodEditModal();
  await loadTimeline();
  await selectPeriod(editingPeriod.period_key);
}

function drillDownChild(key, parentType) {
  if (parentType === 'week') {
    // 子是日 → 切到日视角
    switchView('day').then(() => setTimeout(() => selectNode(key), 200));
  } else {
    // 子是周 → 切到周视角
    switchView('week').then(() => setTimeout(() => selectPeriod(key), 200));
  }
}

function openPeriodEditModal() {
  if (!editingPeriod) return;
  document.getElementById('pe-modal-title').textContent =
    `编辑 ${periodFullLabel(editingPeriod)} 复盘`;
  const showThesis = editingPeriod.period_type === 'month';
  document.getElementById('pe-thesis-block').style.display = showThesis ? '' : 'none';

  const linesOf = arr => Array.isArray(arr) ? arr.join('\n') : '';
  document.getElementById('pe-narrative').value   = editingPeriod.narrative || '';
  document.getElementById('pe-thesis').value      = editingPeriod.monthly_thesis || '';
  document.getElementById('pe-takeaways').value   = linesOf(editingPeriod.key_takeaways);
  document.getElementById('pe-mistakes').value    = linesOf(editingPeriod.mistakes);
  document.getElementById('pe-improvements').value= linesOf(editingPeriod.improvements);
  document.getElementById('pe-playbook').value    = linesOf(editingPeriod.playbook_updates);
  document.getElementById('pe-actions').value     = linesOf(editingPeriod.next_actions);

  document.getElementById('period-edit-modal').classList.add('show');

function closePeriodEditModal() {
  document.getElementById('period-edit-modal').classList.remove('show');
}

async function savePeriodEdit() {
  if (!editingPeriod) return;
  const linesFrom = id => document.getElementById(id).value
    .split('\n').map(s => s.trim()).filter(Boolean);
  const payload = {
    narrative:        document.getElementById('pe-narrative').value.trim() || undefined,
    key_takeaways:    linesFrom('pe-takeaways'),
    mistakes:         linesFrom('pe-mistakes'),
    improvements:     linesFrom('pe-improvements'),
    playbook_updates: linesFrom('pe-playbook'),
    next_actions:     linesFrom('pe-actions'),
  };
  if (editingPeriod.period_type === 'month') {
    const t = document.getElementById('pe-thesis').value.trim();
    if (t) payload.monthly_thesis = t;
  }
  const path = editingPeriod.period_type === 'week' ? 'weekly' : 'monthly';
  const btn = document.getElementById('pe-save-btn');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    await fetch(`/api/review/${path}/${encodeURIComponent(editingPeriod.period_key)}/plan`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    closePeriodEditModal();
    await loadTimeline();
    await selectPeriod(editingPeriod.period_key);
  } catch (e) {
    alert('保存失败：' + e);
  } finally {
    btn.disabled = false; btn.textContent = '保存并重新聚合';
  }
}

async function applyInsightToActions() {
  if (!editingPeriod) return;
  const path = editingPeriod.period_type === 'week' ? 'weekly' : 'monthly';
  const insightRes = await fetch(`/api/review/${path}/${encodeURIComponent(editingPeriod.period_key)}/insights`);
  const insight = await insightRes.json();
  if (!insight.recommended_next_actions?.length) return;
  // 合并：现有 + 推荐，去重
  const merged = [...(editingPeriod.next_actions || []), ...insight.recommended_next_actions];
  const seen = new Set();
  const unique = merged.filter(s => { const k = s.trim(); if (!k || seen.has(k)) return false; seen.add(k); return true; });
  await fetch(`/api/review/${path}/${encodeURIComponent(editingPeriod.period_key)}/plan`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ next_actions: unique }),
  });
  await selectPeriod(editingPeriod.period_key);
}

/* ────────────── 交易权限卡 ────────────── */
let currentPermissionDate = null;
let currentPermissionCard = null;
/** 是否由用户在 modal 里主动切换日期（true 时不再带"今日/明日"语义标签） */
let permissionUserPicked = false;

function permissionStatusLabel(s) {
  return { protect: '🛑 保护', normal: '⚖️ 正常', attack: '🚀 进攻' }[s] || s;
}

function ymdLocal(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

/**
 * 当前应该显示哪一日的权限卡：
 * - 工作日 0:00 - 15:00（A 股收盘前）→ 当日（"今日权限"）
 * - 工作日 15:00 之后 / 周末 → 下一交易日（"明日权限"）
 * 时区按浏览器本地（中国用户即北京时间）。
 */
function activeCardInfo() {
  const now = new Date();
  const dow = now.getDay();          // 0=日 6=六
  const isWeekday = dow >= 1 && dow <= 5;
  const beforeClose = now.getHours() < 15;
  if (isWeekday && beforeClose) {
    return { date: ymdLocal(now), label: '今日权限', kind: 'today' };
  }
  const d = new Date(now);
  d.setDate(d.getDate() + 1);
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
  return { date: ymdLocal(d), label: '明日权限', kind: 'next' };
}

async function loadPermissionChip() {
  const wrap = document.getElementById('permission-chip');
  if (!wrap) return;
  const info = activeCardInfo();
  const target = info.date;
  let card = null;
  try {
    const r = await fetch('/api/permission/' + target);
    if (r.ok) card = (await r.json()).card;
  } catch (e) {}
  // 如果用户没主动切换过，徽章总是跟随活跃日期
  if (!permissionUserPicked) {
    currentPermissionCard = card;
    currentPermissionDate = target;
  }
  const prefix = info.kind === 'today' ? '📅 今日权限' : '🛑 明日权限';
  const tip = info.kind === 'today' ? '点击查看今日权限卡' : '点击查看下一交易日权限卡';
  wrap.title = tip;
  if (!card) {
    wrap.innerHTML = `<span>${prefix}</span><span class="pc-empty" id="pc-chip-status">${target} 未生成</span>`;
    return;
  }
  const lock = card.locked ? ' <span class="pc-locked">🔒</span>' : '';
  wrap.innerHTML =
    `<span>${prefix}</span>` +
    `<span class="pc-status ${card.status}" id="pc-chip-status">${permissionStatusLabel(card.status)}</span>` +
    `<span class="pc-meta">${card.date} · 仓${Math.round((card.max_total_position || 0) * 100)}%${card.allow_margin ? ' · 融' : ''}${lock}</span>`;
}

function openPermissionModal(date) {
  if (date) {
    permissionUserPicked = true;
    currentPermissionDate = date;
  } else {
    permissionUserPicked = false;
    currentPermissionDate = activeCardInfo().date;
  }
  renderPermissionModal();
  document.getElementById('permission-modal').classList.add('show');
}

function closePermissionModal() {
  document.getElementById('permission-modal').classList.remove('show');
  // 关闭后下次默认回到"跟随时间"模式（盘前=今日 / 盘后=明日）
  permissionUserPicked = false;
  loadPermissionChip();
}

async function renderPermissionModal() {
  const body = document.getElementById('pc-modal-body');
  const title = document.getElementById('pc-modal-title');
  const lockBtn = document.getElementById('pc-lock-btn');
  const delBtn = document.getElementById('pc-delete-btn');
  body.innerHTML = '<div style="color:#94a3b8;padding:20px;text-align:center">加载中…</div>';
  // 给标题加"今日/明日/自定义"语义标签
  let semantic = '';
  if (!permissionUserPicked) {
    const info = activeCardInfo();
    if (info.date === currentPermissionDate) {
      semantic = info.kind === 'today' ? '（今日 · 盘前）' : '（明日 · 盘后）';
    }
  }
  title.textContent = `🛑 权限卡 · ${currentPermissionDate}${semantic}`;

  let card = null;
  try {
    const r = await fetch('/api/permission/' + currentPermissionDate);
    if (r.ok) card = (await r.json()).card;
  } catch (e) {}
  currentPermissionCard = card;

  if (!card) {
    body.innerHTML = `
      <div style="text-align:center;padding:30px 20px;color:#94a3b8">
        <div style="font-size:14px;margin-bottom:12px">📭 该日期暂无权限卡</div>
        <div style="font-size:12px;line-height:1.6">
          权限卡由复盘 agent 通过 skill 写入。<br>
          可让 agent 拉取近 3 日复盘数据后调用<br>
          <code style="background:#1e293b;padding:2px 6px;border-radius:3px;color:#cbd5e1">POST /api/permission</code> 生成本日卡片。
        </div>
      </div>`;
    lockBtn.style.display = 'none';
    delBtn.style.display = 'none';
    return;
  }

  lockBtn.style.display = '';
  delBtn.style.display = '';
  lockBtn.textContent = card.locked ? '🔓 解锁' : '🔒 锁定';

  const tagList = (arr, cls) => (arr && arr.length)
    ? arr.map(s => `<span class="pc-tag ${cls || ''}">${escapeHtml(s)}</span>`).join('')
    : '<span style="color:#64748b;font-size:12px">（空）</span>';

  body.innerHTML = `
    <div class="pc-card-status ${card.status}">
      ${permissionStatusLabel(card.status)} · 最大总仓 ${Math.round((card.max_total_position || 0) * 100)}%
      ${card.locked ? ' <span style="font-size:12px;font-weight:500;opacity:.7">🔒 已锁定</span>' : ''}
    </div>
    ${card.rationale ? `<div class="pc-rationale">💡 ${escapeHtml(card.rationale)}</div>` : ''}
    <div class="pc-grid">
      <div class="pc-cell"><div class="pc-k">最大总仓</div><div class="pc-v">${Math.round((card.max_total_position || 0) * 100)}%</div></div>
      <div class="pc-cell"><div class="pc-k">允许融资</div><div class="pc-v">${card.allow_margin ? '是' : '否'}</div></div>
    </div>
    <div class="pc-list"><div class="pc-list-title">✅ 允许模式 (allowed_modes)</div>${tagList(card.allowed_modes)}</div>
    <div class="pc-list"><div class="pc-list-title">🚫 禁止动作 (forbidden_actions)</div>${tagList(card.forbidden_actions, 'danger')}</div>
    <div class="pc-list"><div class="pc-list-title">⏸ 触发停手条件 (stop_triggers)</div>${tagList(card.stop_triggers, 'warn')}</div>
    <div class="pc-meta-block">
      <div>📌 来源: <code>${escapeHtml(card.source || 'manual')}</code> · 创建 ${(card.created_at || '').slice(0, 19).replace('T', ' ')} · 更新 ${(card.updated_at || '').slice(0, 19).replace('T', ' ')}</div>
      <details>
        <summary>🔍 决策依据 (generated_from)</summary>
        <pre>${escapeHtml(JSON.stringify(card.generated_from || {}, null, 2))}</pre>
      </details>
    </div>
  `;
}

async function togglePermissionLock() {
  if (!currentPermissionCard) return;
  const locked = !currentPermissionCard.locked;
  await fetch(`/api/permission/${currentPermissionDate}/lock`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ locked }),
  });
  await renderPermissionModal();
  await loadPermissionChip();
}

async function deletePermissionConfirm() {
  if (!currentPermissionCard) return;
  if (!confirm(`确定删除 ${currentPermissionDate} 的权限卡？\n包含手写内容会一并清空，agent 下次需重新生成。`)) return;
  await fetch('/api/permission/' + currentPermissionDate, { method: 'DELETE' });
  closePermissionModal();
  await loadPermissionChip();
}

function jumpPermissionDate() {
  const next = prompt('切换到哪一日的权限卡？(YYYY-MM-DD)', currentPermissionDate || '');
  if (!next || !/^\d{4}-\d{2}-\d{2}$/.test(next)) return;
  openPermissionModal(next);
}

(async () => { await loadTimeline(); await loadPermissionChip(); })();
// 30 秒刷新一次，确保 15:00 收盘后徽章自动从"今日"切到"明日"
setInterval(loadPermissionChip, 30000);
</script>

<script>
(function() {
  // ── Operation tooltip（粘性）──
  const opt = document.getElementById('op-tooltip');
  let optTimer = null, optPinned = false;
  opt.addEventListener('mouseenter', () => { optPinned = true;  clearTimeout(optTimer); });
  opt.addEventListener('mouseleave', () => { optPinned = false; clearTimeout(optTimer); optTimer = setTimeout(() => { if (!optPinned) opt.classList.remove('show'); }, 200); });

  const DIRECTION_LABEL = { buy:'买入', sell:'卖出', add:'加仓', reduce:'减仓', hold:'持有', observe:'观望', plan:'计划' };
  const VERDICT_LABEL = { excellent:'优秀', good:'良好', neutral:'中性', poor:'欠佳', bad:'糟糕' };
  const VERDICT_COLOR = { excellent:'#22c55e', good:'#84cc16', neutral:'#eab308', poor:'#f97316', bad:'#ef4444' };
  const EMOTION_LABEL = { calm:'冷静', confident:'自信', excited:'兴奋', fomo:'FOMO', greedy:'贪婪', fearful:'恐惧', panic:'恐慌', regret:'后悔', revenge:'报复' };
  const RATIONALE_LABEL = { technical:'技术面', fundamental:'基本面', news:'消息面', baseline:'基于Baseline', emotion:'情绪驱动', impulsive:'上头', system:'系统化', mixed:'混合' };

  window.showOpTooltip = function(el) {
    clearTimeout(optTimer);
    let data;
    try { data = JSON.parse(decodeURIComponent(el.dataset.op || '')); } catch(e) { return; }
    const op = data.op, evals = data.evals || [];

    const evalCards = evals.map(e => {
      const c = VERDICT_COLOR[e.verdict] || '#94a3b8';
      return `
        <div class="opt-eval-card" style="border-color:${c}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="color:${c};font-weight:600">${e.score}分 · ${VERDICT_LABEL[e.verdict] || e.verdict}</span>
            <span style="font-size:10px;color:#64748b">${e.evaluator}</span>
          </div>
          <div style="font-size:10px;color:#64748b;margin-top:3px">Baseline契合度: ${e.alignment_score}%</div>
          ${e.pros && e.pros.length ? `<div style="margin-top:5px"><b style="color:#22c55e;font-size:10px">✓ 优点</b><ul class="opt-eval-list">${e.pros.map(s => `<li>${s}</li>`).join('')}</ul></div>` : ''}
          ${e.cons && e.cons.length ? `<div style="margin-top:5px"><b style="color:#f97316;font-size:10px">✗ 问题</b><ul class="opt-eval-list">${e.cons.map(s => `<li>${s}</li>`).join('')}</ul></div>` : ''}
          ${e.suggestions && e.suggestions.length ? `<div style="margin-top:5px"><b style="color:#3b82f6;font-size:10px">💡 建议</b><ul class="opt-eval-list">${e.suggestions.map(s => `<li>${s}</li>`).join('')}</ul></div>` : ''}
        </div>
      `;
    }).join('');

    opt.innerHTML = `
      <div class="opt-title">${DIRECTION_LABEL[op.direction] || op.direction} · ${op.name} <span style="color:#64748b;font-size:11px">${op.symbol}</span></div>
      ${op.quantity != null ? `<div class="opt-row"><b>数量价格：</b>${op.quantity}股 @ ¥${op.price ?? '—'}${op.amount != null ? ` = ¥${op.amount.toLocaleString()}` : ''}</div>` : ''}
      <div class="opt-row"><b>时间：</b>${(op.timestamp || '').replace('T', ' ').slice(0, 19)}</div>
      <div class="opt-row"><b>情绪：</b>${EMOTION_LABEL[op.emotion_state] || op.emotion_state} · <b style="margin-left:6px">依据：</b>${RATIONALE_LABEL[op.rationale_type] || op.rationale_type}</div>
      ${op.linked_baseline_stage ? `<div class="opt-row"><b>大盘阶段：</b>${op.linked_baseline_stage} · 情绪 ${op.linked_baseline_emotion ?? '—'}</div>` : ''}
      ${op.tags && op.tags.length ? `<div class="opt-row"><b>标签：</b>${op.tags.join('、')}</div>` : ''}
      <div class="opt-section-title">操作依据</div>
      <div class="opt-rationale">${op.rationale}</div>
      ${op.notes ? `<div class="opt-section-title">备注</div><div class="opt-rationale">${op.notes}</div>` : ''}
      ${evals.length ? `<div class="opt-section-title">评估 (${evals.length})</div>${evalCards}` : '<div class="opt-section-title" style="color:#64748b">暂无评估</div>'}
    `;
    opt.classList.add('show');

    requestAnimationFrame(() => {
      const rect = el.getBoundingClientRect();
      const w = opt.offsetWidth, h = opt.offsetHeight;
      let left = rect.left - w - 12;
      if (left < 8) left = rect.right + 12;
      if (left + w > window.innerWidth - 8) left = window.innerWidth - w - 8;
      let top = rect.top;
      if (top + h > window.innerHeight - 8) top = window.innerHeight - h - 8;
      opt.style.left = Math.max(8, left) + 'px';
      opt.style.top  = Math.max(8, top)  + 'px';
    });
  };
  window.hideOpTooltip = function() {
    clearTimeout(optTimer);
    optTimer = setTimeout(() => { if (!optPinned) opt.classList.remove('show'); }, 180);
  };

  // ── Input tooltip（粘性，可移入浮层操作）──
  const itp    = document.getElementById('input-tooltip');
  let itpTimer = null;
  let itpPinned = false;  // 鼠标在浮层内时保持展开

  // 浮层本身 hover 时保持展开
  itp.addEventListener('mouseenter', () => { itpPinned = true;  clearTimeout(itpTimer); });
  itp.addEventListener('mouseleave', () => { itpPinned = false; scheduleHideItp(); });

  function scheduleHideItp(delay) {
    clearTimeout(itpTimer);
    itpTimer = setTimeout(() => { if (!itpPinned) itp.classList.remove('show'); }, delay ?? 200);
  }

  function positionItp(anchorEl) {
    const rect = anchorEl.getBoundingClientRect();
    const w = itp.offsetWidth || 340;
    const h = itp.offsetHeight || 300;
    // 优先放在触发元素右侧；空间不够则放左侧
    let left = rect.right + 10;
    if (left + w > window.innerWidth - 8) left = rect.left - w - 10;
    // 垂直对齐触发元素顶部，超出屏幕则上移
    let top = rect.top;
    if (top + h > window.innerHeight - 8) top = window.innerHeight - h - 8;
    itp.style.left = Math.max(8, left) + 'px';
    itp.style.top  = Math.max(8, top)  + 'px';
  }

  window.showInputTooltip = function(el) {
    clearTimeout(itpTimer);
    let inp;
    try { inp = JSON.parse(decodeURIComponent(el.dataset.inp || '')); } catch(e) { return; }

    document.getElementById('itp-title').textContent = inp.title || '—';

    const set = (id, label, val) => {
      const row = document.getElementById(id);
      if (val !== '' && val != null) { row.innerHTML = `<b>${label}</b>${val}`; row.style.display = ''; }
      else row.style.display = 'none';
    };
    set('itp-source',   '来源：',   inp.source || '');
    set('itp-type',     '类型：',   inp.data_type || '');
    set('itp-conf',     '置信度：', inp.confidence != null ? (inp.confidence * 100).toFixed(0) + '%' : '');
    set('itp-priority', '优先级：', inp.priority != null ? String(inp.priority) : '');
    set('itp-time',     '时间：',   inp.time_key || '');

    const payloadEl = document.getElementById('itp-payload');
    const payload = inp.payload && Object.keys(inp.payload).length
      ? JSON.stringify(inp.payload, null, 2) : '';
    if (payload) { payloadEl.textContent = payload; payloadEl.style.display = ''; }
    else payloadEl.style.display = 'none';

    itp.classList.add('show');
    // 定位（先 show 再定位，拿到实际尺寸）
    requestAnimationFrame(() => positionItp(el));
  };

  window.hideInputTooltip = function() {
    scheduleHideItp(180);
  };
})();

(function() {
  const tooltip = document.getElementById('gantt-tooltip');
  const ttTitle = document.getElementById('gtt-title');
  const ttRange = document.getElementById('gtt-range');
  const ttPhase = document.getElementById('gtt-phase');
  const ttNote  = document.getElementById('gtt-note');
  let showTimer = null;

  document.addEventListener('mousemove', function(e) {
    if (tooltip.classList.contains('show')) {
      const x = e.clientX + 14;
      const y = e.clientY + 14;
      const tw = tooltip.offsetWidth;
      const th = tooltip.offsetHeight;
      tooltip.style.left = (x + tw > window.innerWidth  ? e.clientX - tw - 8 : x) + 'px';
      tooltip.style.top  = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
    }
  });

  window.showGanttTooltip = function(el) {
    clearTimeout(showTimer);
    showTimer = setTimeout(function() {
      let f;
      try { f = JSON.parse(decodeURIComponent(el.dataset.gf || '')); } catch(e) { return; }

      const startStr = f.expected_time ? f.expected_time.slice(0,10) : '';
      const endStr   = f.expected_end_time ? f.expected_end_time.slice(0,10) : '';
      const phase    = f.payload && f.payload.phase ? f.payload.phase : '';
      const note     = f.payload && f.payload.note  ? f.payload.note  : '';
      const sponsor  = f.payload && f.payload.sponsor ? '　辅导机构：' + f.payload.sponsor : '';
      const milestones = f.payload && f.payload.milestones
        ? Object.entries(f.payload.milestones).map(([k,v]) => k + ': ' + v).join(' | ')
        : '';

      ttTitle.textContent = f.title;
      ttRange.innerHTML  = startStr ? '<b>时间区间：</b>' + startStr + (endStr ? ' ~ ' + endStr : '') : '';
      ttPhase.innerHTML  = phase ? '<b>当前阶段：</b>' + phase + sponsor : '';
      ttNote.innerHTML   = (note || milestones) ? '<b>备注：</b>' + (note || milestones) : '';

      ttRange.style.display = startStr ? '' : 'none';
      ttPhase.style.display = phase ? '' : 'none';
      ttNote.style.display  = (note || milestones) ? '' : 'none';

      tooltip.classList.add('show');
    }, 120);
  };

  window.hideGanttTooltip = function() {
    clearTimeout(showTimer);
    tooltip.classList.remove('show');
  };
})();
</script>
</body>
</html>
