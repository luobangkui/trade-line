<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Baseline v2</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f172a;
  --bg2:      #1e293b;
  --bg3:      #334155;
  --border:   #334155;
  --text:     #e2e8f0;
  --muted:    #94a3b8;
  --accent:   #3b82f6;
  --radius:   8px;
  --sidebar:  240px;
  --detail:   340px;
}

body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── Topbar ── */
#topbar {
  height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0;
}
#topbar .logo { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; color: #f1f5f9; }
#topbar .logo span { color: var(--accent); }
#topbar .today-badge {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 10px; font-size: 12px; color: var(--muted);
}
/* 视角切换 segmented */
.view-switch {
  display: inline-flex; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 2px; gap: 0;
}
.view-switch button {
  background: transparent; border: 0; color: var(--muted);
  font-size: 12px; font-weight: 500; padding: 5px 12px;
  border-radius: 6px; cursor: pointer; transition: all .15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.view-switch button:hover { color: var(--text); }
.view-switch button.active {
  background: var(--accent); color: #fff;
  box-shadow: 0 1px 3px rgba(59,130,246,.4);
}
#status-chip {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 14px; font-size: 13px;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── 明日权限卡徽章 ── */
.permission-chip {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 5px 12px; font-size: 12px; color: var(--text);
  cursor: pointer; transition: all .15s; user-select: none;
}
.permission-chip:hover { border-color: var(--accent); }
.permission-chip .pc-status {
  display: inline-flex; align-items: center; gap: 5px;
  font-weight: 700; padding: 1px 8px; border-radius: 4px; font-size: 11px;
}
.permission-chip .pc-status.protect { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
.permission-chip .pc-status.normal  { background: rgba(234,179,8,.15);  color: #facc15; border: 1px solid rgba(234,179,8,.3); }
.permission-chip .pc-status.attack  { background: rgba(34,197,94,.15);  color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
.permission-chip .pc-empty  { color: var(--muted); }
.permission-chip .pc-meta   { color: var(--muted); font-size: 11px; }
.permission-chip .pc-locked { font-size: 11px; }

/* 权限卡 modal 内部样式 */
.pc-card-status {
  display: inline-flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 18px; padding: 8px 16px; border-radius: 8px;
  margin-bottom: 16px;
}
.pc-card-status.protect { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
.pc-card-status.normal  { background: rgba(234,179,8,.15);  color: #facc15; border: 1px solid rgba(234,179,8,.3); }
.pc-card-status.attack  { background: rgba(34,197,94,.15);  color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
.pc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.pc-grid .pc-cell { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.pc-grid .pc-cell .pc-k { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.pc-grid .pc-cell .pc-v { font-size: 14px; color: var(--text); font-weight: 600; }
.pc-list { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; }
.pc-list .pc-list-title { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.pc-list .pc-tag {
  display: inline-block; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px; margin: 2px 4px 2px 0;
  font-size: 12px; color: var(--text);
}
.pc-list .pc-tag.danger { color: #f87171; border-color: rgba(239,68,68,.4); }
.pc-list .pc-tag.warn   { color: #facc15; border-color: rgba(234,179,8,.4); }
.pc-rationale {
  background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.3);
  border-radius: 6px; padding: 10px 14px; margin-bottom: 12px;
  font-size: 13px; line-height: 1.6; color: #93c5fd;
}
.pc-meta-block {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; font-size: 12px; color: var(--muted);
}
.pc-meta-block details { margin-top: 6px; }
.pc-meta-block summary { cursor: pointer; color: var(--text); font-size: 12px; padding: 2px 0; }
.pc-meta-block pre {
  background: #0f172a; border: 1px solid var(--border); border-radius: 4px;
  padding: 8px; margin-top: 6px; font-size: 11px; color: #cbd5e1;
  overflow-x: auto; max-height: 200px; white-space: pre-wrap;
}

/* ── Layout ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar); background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
.sidebar-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.sidebar-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.stat-card {
  background: var(--bg3); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px;
}
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.stat-value { font-size: 20px; font-weight: 700; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

#filter-list { display: flex; flex-direction: column; gap: 4px; }
.filter-btn {
  background: none; border: 1px solid transparent; border-radius: 6px; color: var(--muted);
  font-size: 12px; padding: 5px 8px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.filter-btn:hover { background: var(--bg3); color: var(--text); }
.filter-btn.active { background: var(--bg3); border-color: var(--border); color: var(--text); }
.filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

#date-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.date-item {
  padding: 6px 16px; cursor: pointer; font-size: 12px; color: var(--muted);
  display: flex; align-items: center; gap: 6px; transition: background .1s;
}
.date-item:hover { background: var(--bg3); color: var(--text); }
.date-item.today { color: var(--accent); font-weight: 600; }
.date-item.selected { background: var(--bg3); color: var(--text); }
.date-item .di-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Timeline ── */
/* ── 横向时间轴 ── */
#timeline-wrap {
  flex: 1; overflow-x: auto; overflow-y: hidden;
  display: flex; align-items: stretch;
}
#timeline {
  display: flex; flex-direction: row;
  position: relative; flex-shrink: 0;
  min-height: 620px; height: 100%;
}
/* 左右留白，让首尾节点能居中 */
#timeline::before, #timeline::after {
  content: ''; display: block; width: 45vw; flex-shrink: 0; pointer-events: none;
}

/* 横向轴线 */
.tl-axis {
  position: absolute; top: 50%; left: 0; right: 0;
  height: 2px; background: var(--border); transform: translateY(-50%);
}

/* 节点容器：绝对定位上下布局 */
.tl-node-wrap {
  position: relative; flex-shrink: 0; width: 270px; height: 100%;
  cursor: pointer; transition: opacity .25s ease, transform .25s ease;
}
.tl-node-wrap:hover { opacity: .88; }
.tl-node-wrap.filtered { display: none; }

/* 卡片尺寸样式（绝对定位由下面 odd/even 决定） */
.tl-card {
  position: absolute; left: 16px; right: 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  transition: border-color .15s, box-shadow .15s;
}
.tl-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 25%, transparent); }
.tl-card.today-card { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent); }

/* 奇数节点：卡片在上 */
.tl-node-wrap:nth-child(odd) .tl-card:not([style*="visibility"]) {
  bottom: calc(50% + 76px);
}
/* 偶数节点：卡片在下 */
.tl-node-wrap:nth-child(even) .tl-card:not([style*="visibility"]) {
  top: calc(50% + 76px);
}
/* 占位 card 隐藏 */
.tl-card[style*="visibility"] { display: none !important; }

/* 连接器：绝对居中在轴线上 */
.tl-connector {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
/* 连接线：从 connector 向卡片方向延伸 */
.tl-connector-line {
  position: absolute; width: 2px; background: var(--border);
  left: 50%; transform: translateX(-50%);
}
.tl-node-wrap:nth-child(odd)  .tl-connector-line { bottom: 100%; height: 76px; }
.tl-node-wrap:nth-child(even) .tl-connector-line { top:    100%; height: 76px; }

/* Node shapes */
.tl-shape { width: 24px; height: 24px; flex-shrink: 0; z-index: 1; position: relative; display: flex; align-items: center; justify-content: center; }
.shape-circle { width: 16px; height: 16px; border-radius: 50%; border: 3px solid; background: var(--bg); }
.shape-diamond { width: 14px; height: 14px; border: 3px solid; background: var(--bg); transform: rotate(45deg); }
.shape-triangle {
  width: 0; height: 0;
  border-left: 9px solid transparent; border-right: 9px solid transparent; border-bottom: 15px solid;
}
.tl-shape.today-shape .shape-circle,
.tl-shape.today-shape .shape-diamond { box-shadow: 0 0 0 4px currentColor33; }

.card-date { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.card-date .bell { font-size: 11px; }
.card-stage { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
  background: var(--bg3);
}
.emotion-bar { height: 5px; background: var(--bg3); border-radius: 3px; margin: 7px 0; overflow: hidden; }
.emotion-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.card-events { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

/* Future node */
.tl-card.future-card { opacity: .75; border-style: dashed; }

/* ── Selected / Focus spotlight ── */
#timeline.has-selection .tl-node-wrap {
  transition: opacity .3s ease, transform .3s ease;
}
/* 非选中节点淡出 */
#timeline.has-selection .tl-node-wrap:not(.active-node) {
  opacity: 0.28;
  transform: scale(0.96);
}
/* 选中节点：整行放大，确保可见 */
#timeline.has-selection .tl-node-wrap.active-node {
  opacity: 1;
  transform: scale(1.06);
  z-index: 20;
  position: relative;
  overflow: visible;
}
/* 选中卡片：边框高亮 + 光晕 + 背景加深 */
#timeline.has-selection .tl-node-wrap.active-node .tl-card:not([style*="visibility:hidden"]) {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 35%, transparent),
              0 12px 40px rgba(0,0,0,.55);
  background: #18243e;
  transition: border-color .3s, box-shadow .3s, background .3s;
}
/* 形状节点发光放大 */
#timeline.has-selection .tl-node-wrap.active-node .shape-circle {
  width: 22px; height: 22px; border-width: 4px;
  box-shadow: 0 0 0 5px color-mix(in srgb, currentColor 25%, transparent);
  transition: all .3s ease;
}
#timeline.has-selection .tl-node-wrap.active-node .shape-diamond {
  width: 20px; height: 20px; border-width: 4px;
  box-shadow: 0 0 0 5px color-mix(in srgb, currentColor 25%, transparent);
  transition: all .3s ease;
}
/* 文字也稍微放大 */
#timeline.has-selection .tl-node-wrap.active-node .card-stage { font-size: 16px; }
#timeline.has-selection .tl-node-wrap.active-node .card-date  { font-size: 13px; color: #cbd5e1; }

/* ── Detail Panel ── */
#detail {
  width: var(--detail); background: var(--bg2); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  transform: translateX(100%); transition: transform .25s ease;
}
#detail.open { transform: translateX(0); }

#detail-header {
  display: flex; align-items: center; gap: 10px; padding: 16px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#detail-date { font-size: 15px; font-weight: 700; flex: 1; }
#detail-close {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--muted); padding: 4px 10px; cursor: pointer; font-size: 12px;
}
#detail-close:hover { background: var(--bg3); color: var(--text); }

#detail-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

.detail-section { }
.detail-section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }

.detail-stage-badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid;
}

.emotion-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.emotion-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.emotion-num { font-size: 20px; font-weight: 700; min-width: 36px; }
.emotion-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.emotion-progress { height: 100%; border-radius: 4px; transition: width .5s; }

.risk-badge { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
.risk-LOW      { background: #052e16; color: #22c55e; }
.risk-MEDIUM   { background: #422006; color: #eab308; }
.risk-HIGH     { background: #431407; color: #f97316; }
.risk-EXTREME  { background: #450a0a; color: #ef4444; }

.position-range { display: flex; align-items: center; gap: 8px; }
.pos-bar { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; position: relative; overflow: hidden; }
.pos-fill { height: 100%; background: var(--accent); border-radius: 4px; position: absolute; }
.pos-label { font-size: 13px; font-weight: 600; color: var(--accent); }

.event-list, .future-list, .input-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.event-item { font-size: 12px; color: var(--muted); padding: 5px 8px; background: var(--bg3); border-radius: 5px; line-height: 1.4; }
.future-item { font-size: 12px; padding: 8px 10px; background: var(--bg3); border-radius: 6px; border-left: 3px solid var(--accent); }
.future-item .fi-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.future-item .fi-title { color: var(--text); font-size: 12px; line-height: 1.4; margin-bottom: 4px; }
.future-item .fi-range { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
.future-item .fi-progress-wrap { height: 4px; background: var(--bg2); border-radius: 2px; overflow: hidden; }
.future-item .fi-progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .3s; }
.future-item .fi-progress-label { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: right; }

.active-event-item { font-size: 12px; padding: 8px 10px; background: var(--bg3); border-radius: 6px; border-left: 3px solid #22c55e; }
.active-event-item .ae-badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #052e16; color: #22c55e; display: inline-block; margin-bottom: 4px; }
.active-event-item .ae-title { color: var(--text); font-size: 12px; line-height: 1.4; margin-bottom: 4px; }
.active-event-item .ae-range { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
.active-event-item .ae-progress-wrap { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; position: relative; }
.active-event-item .ae-progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #22c55e66, #22c55e); }
.active-event-item .ae-progress-today { position: absolute; top: 0; width: 2px; height: 100%; background: #fff; border-radius: 1px; }
.active-event-item .ae-progress-label { font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; justify-content: space-between; }

/* Future Events Gantt */
.gantt-section {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  min-height: 0;          /* 允许压缩 */
  max-height: 38vh;       /* 给日期列表留空间 */
}
.gantt-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
.gantt-count { background: var(--bg3); color: var(--accent); font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 500; }
#sidebar-gantt { overflow-y: auto; flex: 1; padding-right: 4px; min-height: 0; }
#sidebar-gantt::-webkit-scrollbar { width: 6px; }
#sidebar-gantt::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
#sidebar-gantt::-webkit-scrollbar-track { background: transparent; }
.gantt-item { margin-bottom: 10px; }
.gantt-item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; flex-wrap: wrap; }
.gantt-item-title { font-size: 11px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gantt-bar-row { display: flex; align-items: center; gap: 6px; }
.gantt-bar-wrap { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; position: relative; }
.gantt-bar-fill { height: 100%; border-radius: 4px; }
.gantt-bar-today { position: absolute; top: 0; height: 100%; width: 2px; background: #fff8; }
.gantt-bar-pct { font-size: 10px; color: var(--muted); white-space: nowrap; min-width: 30px; text-align: right; }
.gantt-date-range { font-size: 10px; color: var(--muted); margin-top: 1px; }
.gantt-empty { font-size: 11px; color: var(--muted); opacity: .6; }

/* Gantt tooltip */
.gantt-item { position: relative; cursor: default; }
.gantt-tooltip {
  display: none;
  position: fixed;
  z-index: 9999;
  max-width: 260px;
  background: #1e2433;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  box-shadow: 0 8px 24px #0008;
  pointer-events: none;
}
.gantt-tooltip.show { display: block; }
.gantt-tooltip-title { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.5; margin-bottom: 6px; }
.gantt-tooltip-row { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.gantt-tooltip-row b { color: #94a3b8; }

.input-item { background: var(--bg3); border-radius: 5px; padding: 7px 9px; cursor: default; position: relative; }
.input-item:hover { background: #1e2a3a; }

/* Input tooltip — sticky, hoverable */
.input-tooltip {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 340px;
  max-height: 420px;
  background: #1a2133;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 13px 15px 12px;
  box-shadow: 0 12px 40px #000b;
  pointer-events: auto;
  font-size: 12px;
  line-height: 1.65;
  overflow-y: auto;
}
.input-tooltip.show { display: block; }
.itp-title { font-size: 13px; color: #e2e8f0; font-weight: 600; margin-bottom: 9px; line-height: 1.5; }
.itp-row { color: #94a3b8; margin-top: 3px; }
.itp-row b { color: #cbd5e1; margin-right: 5px; }
.itp-payload {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid #2d3748;
  color: #64748b; font-family: monospace; font-size: 11px;
  white-space: pre-wrap; word-break: break-all;
  max-height: 180px; overflow-y: auto;
  background: #111827; border-radius: 5px; padding: 8px;
}

/* ── 复盘操作列表 ── */
.op-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
.op-item {
  background: var(--bg3); border-radius: 7px; padding: 10px 12px;
  cursor: default; transition: background .15s; border-left: 3px solid var(--border);
}
.op-item:hover { background: #1e2a3a; border-left-color: var(--accent); }
.op-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.op-dir { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.op-symbol { font-size: 13px; color: var(--text); flex: 1; min-width: 100px; }
.op-score { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
.op-meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.op-meta span { background: #11182780; padding: 1px 6px; border-radius: 3px; }
.op-stage { color: #94a3b8 !important; }
.op-rationale {
  font-size: 11px; color: #cbd5e1; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* 操作详情 tooltip */
.op-tooltip {
  display: none; position: fixed; z-index: 9999;
  width: 380px; max-height: 500px;
  background: #1a2133; border: 1px solid #334155;
  border-radius: 10px; padding: 14px 16px;
  box-shadow: 0 12px 40px #000b;
  pointer-events: auto; font-size: 12px; line-height: 1.6;
  overflow-y: auto;
}
.op-tooltip.show { display: block; }
.opt-title { font-size: 14px; color: #e2e8f0; font-weight: 600; margin-bottom: 8px; }
.opt-row { color: #94a3b8; margin-top: 3px; }
.opt-row b { color: #cbd5e1; margin-right: 5px; }
.opt-section-title { color: #cbd5e1; font-weight: 600; margin-top: 10px; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
.opt-rationale { background: #111827; padding: 8px 10px; border-radius: 5px; color: #e2e8f0; margin-top: 4px; line-height: 1.6; }
.opt-eval-card { background: #111827; padding: 8px 10px; border-radius: 5px; margin-top: 6px; border-left: 3px solid; }
.opt-eval-list { padding-left: 16px; margin: 4px 0 0 0; color: #cbd5e1; font-size: 11px; }

/* ── 日度复盘 ── */
.review-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.review-stat { background: var(--bg3); border-radius: 6px; padding: 8px 10px; }
.rs-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.rs-value { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 2px; }
.review-mood { background: var(--bg3); border-radius: 6px; padding: 8px 10px; font-size: 12px; color: #cbd5e1; margin-bottom: 8px; }
.review-dist .rd-row { font-size: 11px; color: var(--muted); margin-top: 4px; }
.review-dist b { color: #94a3b8; margin-right: 4px; }
.rd-tag { display: inline-block; background: var(--bg3); padding: 1px 7px; border-radius: 8px; margin-right: 4px; color: #cbd5e1; }

.review-block { margin-bottom: 8px; }
.rb-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.rb-list { padding-left: 18px; margin: 0; color: #cbd5e1; font-size: 12px; line-height: 1.6; }
.rb-list li { margin-bottom: 2px; }
.input-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.src-badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--bg2); color: var(--muted); border: 1px solid var(--border); }
.input-title { font-size: 12px; color: var(--text); line-height: 1.3; }

.style-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.style-chip { font-size: 11px; padding: 3px 8px; border-radius: 12px; border: 1px solid; }
.chip-prefer { border-color: #22c55e44; color: #22c55e; background: #052e16; }
.chip-avoid  { border-color: #ef444444; color: #ef4444; background: #450a0a; }

.action-summary-box { background: var(--bg3); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; line-height: 1.6; color: var(--text); border-left: 3px solid var(--accent); }

.detail-btn {
  width: 100%; padding: 9px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; transition: all .15s;
}
.detail-btn:hover { background: var(--accent); border-color: var(--accent); }
.detail-btn.loading { opacity: .6; pointer-events: none; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ── Loading overlay ── */
#loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 12px; }
#loading.hidden { display: none; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { font-size: 14px; color: var(--muted); }

/* ── Empty ── */
.empty-hint { color: var(--muted); font-size: 12px; text-align: center; padding: 20px 0; }

/* ── 周/月节点：宽矩形，更突出聚合统计 ── */
.tl-node-wrap.period-node { width: 320px; }
.tl-node-wrap.period-node.month-node { width: 380px; }
.tl-card.period-card {
  display: flex; flex-direction: column; gap: 8px;
  padding: 14px 16px;
}
.period-card .pc-header {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.period-card .pc-key {
  font-size: 17px; font-weight: 700; letter-spacing: -.3px; color: #f1f5f9;
}
.period-card .pc-key .pc-sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 6px; }
.period-card .pc-score {
  font-size: 22px; font-weight: 700; line-height: 1;
}
.period-card .pc-meta {
  display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px;
}
.period-card .pc-meta .badge { background: var(--bg3); }
.period-card .pc-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.period-card .pc-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.period-card .pc-narrative {
  font-size: 11px; color: var(--muted); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.period-card.is-empty { opacity: .55; }
.period-card.is-future { border-style: dashed; opacity: .65; }

.period-shape { width: 28px; height: 28px; border-radius: 6px; border: 3px solid; background: var(--bg); }
.period-shape.month { width: 30px; height: 30px; border-radius: 8px; }
.period-shape.is-current { box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 25%, transparent); }

/* ── 历史模式洞察卡片 ── */
.insight-card {
  background: linear-gradient(135deg, rgba(59,130,246,.08), rgba(168,85,247,.06));
  border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
  border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
}
.insight-card .ic-title {
  font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.insight-card .ic-trend {
  display: flex; align-items: end; gap: 3px; height: 36px;
  background: rgba(15,23,42,.4); padding: 4px 6px; border-radius: 5px;
  margin-bottom: 8px;
}
.insight-card .ic-trend-bar {
  flex: 1; min-width: 4px; background: var(--accent);
  border-radius: 2px 2px 0 0; min-height: 2px; opacity: .7;
  transition: opacity .15s; cursor: default;
}
.insight-card .ic-trend-bar:hover { opacity: 1; }
.insight-card .ic-trend-bar.current { background: #f59e0b; opacity: 1; }
.insight-card .ic-warn-list { font-size: 11px; color: #cbd5e1; line-height: 1.6; }
.insight-card .ic-warn-list li { margin-bottom: 3px; }
.insight-card .ic-warn-list li::marker { color: var(--muted); }
.insight-card .ic-section-title {
  font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
  margin: 8px 0 4px;
}
.insight-card .ic-apply-btn {
  margin-top: 10px; width: 100%; background: var(--accent); border: 0; color: #fff;
  border-radius: 6px; padding: 7px; font-size: 12px; cursor: pointer; font-weight: 500;
  transition: opacity .15s;
}
.insight-card .ic-apply-btn:hover { opacity: .85; }
.insight-card .ic-apply-btn:disabled { background: var(--bg3); color: var(--muted); cursor: default; }

/* ── 子周期下钻列表 ── */
.child-list { display: flex; flex-direction: column; gap: 5px; }
.child-item {
  background: var(--bg3); border-radius: 6px; padding: 7px 10px;
  cursor: pointer; transition: background .12s;
  display: flex; align-items: center; gap: 10px; font-size: 12px;
}
.child-item:hover { background: #1e2a3a; }
.child-item .ci-key { color: var(--text); font-weight: 500; min-width: 78px; }
.child-item .ci-meta { color: var(--muted); flex: 1; font-size: 11px; }
.child-item .ci-score { font-weight: 600; }

/* ── 可编辑文本区块 ── */
.editable-block { position: relative; }
.editable-block .eb-edit-btn {
  position: absolute; top: -2px; right: 0;
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  border-radius: 4px; font-size: 10px; padding: 2px 7px; cursor: pointer;
}
.editable-block .eb-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── 编辑模态浮层 ── */
.modal-mask {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55);
  z-index: 9998; align-items: center; justify-content: center; padding: 20px;
}
.modal-mask.show { display: flex; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 640px; max-height: 88vh; overflow: hidden;
  display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.6);
}
.modal-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.modal-title { font-size: 15px; font-weight: 700; flex: 1; color: #f1f5f9; }
.modal-close {
  background: none; border: 1px solid var(--border); border-radius: 5px;
  color: var(--muted); padding: 4px 9px; cursor: pointer; font-size: 12px;
}
.modal-close:hover { background: var(--bg3); color: var(--text); }
.modal-body {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 14px;
}
.modal-footer {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}
.modal-btn {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 7px 16px; font-size: 13px; cursor: pointer;
  transition: all .15s;
}
.modal-btn:hover { background: #1e2a3a; }
.modal-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.modal-btn.primary:hover { opacity: .88; }
.modal-btn.danger { background: transparent; border-color: #ef444466; color: #ef4444; }
.modal-btn.danger:hover { background: #450a0a; border-color: #ef4444; }
.modal-footer-spacer { flex: 1; }

.field-block { display: flex; flex-direction: column; gap: 5px; }
.field-block label {
  font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
  display: flex; align-items: center; gap: 6px;
}
.field-block label .helper { font-size: 10px; color: #64748b; text-transform: none; letter-spacing: 0; }
.field-block textarea, .field-block input[type="text"] {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit;
  resize: vertical; line-height: 1.5;
}
.field-block textarea { min-height: 64px; }
.field-block textarea:focus, .field-block input[type="text"]:focus {
  outline: 0; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,.15);
}

/* ── 复盘日志区块 (Review Journal) ── */
.journal-section { margin-top: 8px; }
.journal-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.journal-header .jh-title {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .8px; flex: 1;
}
.journal-header .jh-add-btn {
  background: var(--accent); border: 0; color: #fff;
  border-radius: 5px; padding: 3px 9px; font-size: 11px; cursor: pointer;
}
.journal-header .jh-add-btn:hover { opacity: .85; }
.journal-list { display: flex; flex-direction: column; gap: 8px; }
.journal-item {
  background: var(--bg3); border-radius: 7px; padding: 10px 12px;
  border-left: 3px solid var(--accent);
}
.journal-item.is-final { border-left-color: #22c55e; }
.journal-item.is-draft { border-left-color: #eab308; }
.ji-head {
  display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap;
}
.ji-status {
  font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600;
}
.ji-status.is-draft { background: #422006; color: #eab308; }
.ji-status.is-final { background: #052e16; color: #22c55e; }
.ji-source { font-size: 10px; color: var(--muted); }
.ji-time { font-size: 10px; color: #64748b; margin-left: auto; }
.ji-title { font-size: 13px; color: var(--text); font-weight: 600; line-height: 1.4; cursor: pointer; }
.ji-title:hover { color: var(--accent); }
.ji-summary {
  font-size: 11px; color: #cbd5e1; line-height: 1.55; margin-top: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ji-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.ji-tag {
  font-size: 10px; padding: 1px 7px; border-radius: 8px;
  background: var(--bg2); color: var(--muted); border: 1px solid var(--border);
}
.ji-actions {
  display: flex; gap: 6px; margin-top: 7px; padding-top: 7px;
  border-top: 1px dashed var(--border);
}
.ji-action-btn {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  border-radius: 4px; padding: 3px 9px; font-size: 11px; cursor: pointer;
  transition: all .12s;
}
.ji-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.ji-action-btn.danger:hover { border-color: #ef4444; color: #ef4444; }

/* journal 详情/编辑 模态 */
.modal-box.wide { max-width: 760px; }
.journal-view-section { margin-bottom: 12px; }
.jvs-title {
  font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 5px; font-weight: 600;
}
.jvs-content {
  font-size: 13px; color: var(--text); line-height: 1.65;
  background: var(--bg3); border-radius: 6px; padding: 10px 12px;
  white-space: pre-wrap; word-break: break-word;
}
.jvs-list { padding-left: 18px; margin: 0; color: #cbd5e1; font-size: 12px; line-height: 1.65; }
.jvs-section-card {
  background: var(--bg3); border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
  border-left: 3px solid var(--accent);
}
.jvs-section-card .ssc-title {
  font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px;
}
.jvs-section-card .ssc-kind {
  font-size: 9px; padding: 1px 6px; border-radius: 6px;
  background: var(--bg2); color: var(--muted); margin-left: 6px;
}
.jvs-section-card .ssc-content {
  font-size: 12px; color: #cbd5e1; line-height: 1.6; white-space: pre-wrap;
}

.section-editor { display: flex; flex-direction: column; gap: 8px; }
.section-editor .se-row {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  padding: 10px; display: flex; flex-direction: column; gap: 6px;
}
.section-editor .se-row-head {
  display: flex; gap: 6px; align-items: center;
}
.section-editor .se-row-head input { flex: 1; }
.section-editor .se-row input.kind {
  flex: 0 0 110px; font-size: 12px;
}
.section-editor .se-rm-btn {
  background: transparent; border: 1px solid var(--border); color: #ef4444;
  border-radius: 4px; padding: 3px 9px; font-size: 11px; cursor: pointer;
}
.section-editor .se-rm-btn:hover { border-color: #ef4444; }
.section-editor .se-add-btn {
  background: transparent; border: 1px dashed var(--border); color: var(--muted);
  border-radius: 6px; padding: 7px; font-size: 12px; cursor: pointer;
  transition: all .15s;
}
.section-editor .se-add-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-text">加载时间线...</div>
</div>

<!-- Topbar -->
<div id="topbar">
  <div class="logo">Trade <span>Baseline</span> v2</div>
  <div class="view-switch" id="view-switch">
    <button class="active" data-view="day"   onclick="switchView('day')">📅 日复盘</button>
    <button              data-view="week"  onclick="switchView('week')">📊 周复盘</button>
    <button              data-view="month" onclick="switchView('month')">📈 月复盘</button>
  </div>
  <div class="today-badge" id="today-label">—</div>
  <div class="permission-chip" id="permission-chip" onclick="openPermissionModal()" title="点击查看明日权限卡详情">
    <span>🛑 明日权限</span>
    <span class="pc-empty" id="pc-chip-status">—</span>
  </div>
  <div id="status-chip">
    <div class="status-dot" id="status-dot" style="background:#94a3b8"></div>
    <span id="status-text">—</span>
  </div>
</div>

<div id="main">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">今日概览</div>
      <div class="stat-card">
        <div class="stat-label">市场阶段</div>
        <div class="stat-value" id="stat-stage" style="font-size:15px">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">情绪指数</div>
        <div class="stat-value" id="stat-emotion">—</div>
        <div class="stat-sub" id="stat-risk">风险等级 —</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">建议仓位</div>
        <div class="stat-value" id="stat-pos" style="font-size:15px">—</div>
      </div>
    </div>

    <div class="sidebar-section gantt-section">
      <div class="gantt-title">
        <span>未来事件轴</span>
        <span class="gantt-count" id="gantt-count" style="display:none"></span>
      </div>
      <div id="sidebar-gantt"><div class="gantt-empty">加载中…</div></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">按阶段筛选</div>
      <div id="filter-list">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">
          <span class="filter-dot" style="background:var(--muted)"></span>全部
        </button>
        <button class="filter-btn" data-filter="CHAOS" onclick="setFilter('CHAOS',this)">
          <span class="filter-dot" style="background:#ef4444"></span>混乱期
        </button>
        <button class="filter-btn" data-filter="REPAIR_EARLY" onclick="setFilter('REPAIR_EARLY',this)">
          <span class="filter-dot" style="background:#f97316"></span>修复早期
        </button>
        <button class="filter-btn" data-filter="REPAIR_CONFIRM" onclick="setFilter('REPAIR_CONFIRM',this)">
          <span class="filter-dot" style="background:#eab308"></span>修复确认
        </button>
        <button class="filter-btn" data-filter="MAIN_UP" onclick="setFilter('MAIN_UP',this)">
          <span class="filter-dot" style="background:#22c55e"></span>主升行情
        </button>
        <button class="filter-btn" data-filter="HIGH_RISK" onclick="setFilter('HIGH_RISK',this)">
          <span class="filter-dot" style="background:#a855f7"></span>高位风险
        </button>
        <button class="filter-btn" data-filter="DISTRIBUTION" onclick="setFilter('DISTRIBUTION',this)">
          <span class="filter-dot" style="background:#6366f1"></span>出货期
        </button>
        <button class="filter-btn" data-filter="future" onclick="setFilter('future',this)">
          <span class="filter-dot" style="background:#3b82f6"></span>未来节点
        </button>
      </div>
    </div>

    <div class="sidebar-title" style="padding:12px 16px 4px">日期列表</div>
    <div id="date-list"></div>
  </div>

  <!-- Timeline -->
  <div id="timeline-wrap">
    <div id="timeline">
      <div class="tl-axis"></div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div id="detail">
    <div id="detail-header">
      <div id="detail-date">—</div>
      <button id="detail-close" onclick="closeDetail()">✕ 关闭</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
const STAGE_META = {
  CHAOS:          { label:'混乱期',   color:'#ef4444', bg:'#450a0a' },
  REPAIR_EARLY:   { label:'修复早期', color:'#f97316', bg:'#431407' },
  REPAIR_CONFIRM: { label:'修复确认', color:'#eab308', bg:'#422006' },
  MAIN_UP:        { label:'主升行情', color:'#22c55e', bg:'#052e16' },
  HIGH_RISK:      { label:'高位风险', color:'#a855f7', bg:'#2e1065' },
  DISTRIBUTION:   { label:'出货期',   color:'#6366f1', bg:'#1e1b4b' },
  UNKNOWN:        { label:'未知',     color:'#94a3b8', bg:'#1e293b' },
};

let timelineData = null;
let selectedDate = null;
let activeFilter = 'all';
let allFutureEvents = [];

/* ── 视角切换：日 / 周 / 月 ── */
let viewMode = 'day';                  // 'day' | 'week' | 'month'
let periodTimelineData = null;          // { type, today, periods: [...] }
let selectedPeriodKey = null;
let editingPeriod = null;               // 当前正在编辑的周期对象

const VIEW_LABEL = { day: '日', week: '周', month: '月' };

async function loadTimeline() {
  if (viewMode === 'day') {
    const end = offsetDate(new Date(), 14);
    const start = offsetDate(new Date(), -45);
    const [res, fRes] = await Promise.all([
      fetch(`/api/baseline/timeline?start=${start}&end=${end}`),
      fetch('/api/baseline/future'),
    ]);
    timelineData = await res.json();
    const fData = await fRes.json();
    allFutureEvents = Array.isArray(fData) ? fData.filter(f => f.review_status !== 'expired') : [];
    renderSidebar();
    renderTimeline();
    renderGanttSidebar();
    updateTopbar();
    document.getElementById('loading').classList.add('hidden');
    if (timelineData.today) {
      setTimeout(() => selectNode(timelineData.today), 150);
    }
  } else {
    // 周/月视角
    let start, end;
    if (viewMode === 'week') {
      start = offsetDate(new Date(), -90);   // 约 12 周
      end   = offsetDate(new Date(), 14);
    } else {
      start = offsetDate(new Date(), -240);  // 约 8 个月
      end   = offsetDate(new Date(), 14);
    }
    const res = await fetch(`/api/review/period/timeline?type=${viewMode}&start=${start}&end=${end}`);
    periodTimelineData = await res.json();
    renderPeriodSidebar();
    renderPeriodTimeline();
    updateTopbar();
    document.getElementById('loading').classList.add('hidden');
    if (periodTimelineData?.today) {
      setTimeout(() => selectPeriod(periodTimelineData.today), 150);
    }
  }
}

async function switchView(mode) {
  if (mode === viewMode) return;
  viewMode = mode;
  document.querySelectorAll('#view-switch button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === mode);
  });
  // 清理选中态
  selectedDate = null;
  selectedPeriodKey = null;
  document.getElementById('detail').classList.remove('open');
  document.getElementById('timeline').classList.remove('has-selection');
  document.getElementById('loading').classList.remove('hidden');
  await loadTimeline();
}

function offsetDate(d, days) {
  const r = new Date(d);
  r.setDate(r.getDate() + days);
  return r.toISOString().slice(0, 10);
}

function updateTopbar() {
  if (viewMode === 'day') {
    if (!timelineData) return;
    const today = timelineData.today;
    document.getElementById('today-label').textContent = today;
    const todayNode = timelineData.nodes.find(n => n.date === today);
    const snap = todayNode?.snapshot;
    if (snap) {
      const meta = STAGE_META[snap.market_stage] || STAGE_META.UNKNOWN;
      document.getElementById('status-dot').style.background = meta.color;
      document.getElementById('status-text').textContent = `${meta.label} · 情绪 ${snap.emotion_score}`;
      document.getElementById('stat-stage').textContent = meta.label;
      document.getElementById('stat-stage').style.color = meta.color;
      document.getElementById('stat-emotion').textContent = snap.emotion_score;
      document.getElementById('stat-risk').textContent = `风险等级 ${snap.risk_level}`;
      document.getElementById('stat-pos').textContent =
        `${Math.round(snap.position_min*100)}% – ${Math.round(snap.position_max*100)}%`;
    }
  } else {
    if (!periodTimelineData) return;
    document.getElementById('today-label').textContent = periodTimelineData.today + ' · ' + VIEW_LABEL[viewMode] + '复盘';
    const cur = periodTimelineData.periods.find(p => p.is_current);
    if (cur) {
      const c = scoreColor(cur.avg_score);
      document.getElementById('status-dot').style.background = c;
      document.getElementById('status-text').textContent =
        `本${VIEW_LABEL[viewMode]} 评分 ${cur.avg_score} · 契合度 ${cur.baseline_alignment}%`;
      document.getElementById('stat-stage').textContent = `${cur.operations_count} 笔操作`;
      document.getElementById('stat-stage').style.color = c;
      document.getElementById('stat-emotion').textContent = cur.avg_score;
      document.getElementById('stat-risk').textContent =
        `胜率 ${cur.win_rate != null ? Math.round(cur.win_rate * 100) + '%' : '—'}`;
      document.getElementById('stat-pos').textContent =
        cur.baseline_alignment ? cur.baseline_alignment + '% 契合' : '—';
    } else {
      document.getElementById('status-dot').style.background = '#94a3b8';
      document.getElementById('status-text').textContent = '本' + VIEW_LABEL[viewMode] + ' 暂无聚合';
    }
  }
}

function scoreColor(score) {
  if (!score) return '#475569';
  if (score >= 80) return '#22c55e';
  if (score >= 65) return '#84cc16';
  if (score >= 50) return '#eab308';
  if (score >= 35) return '#f97316';
  return '#ef4444';
}

function periodLabel(p) {
  if (p.period_type === 'week') {
    const m = /^(\d{4})-W(\d{1,2})$/.exec(p.period_key);
    return m ? `W${m[2]}` : p.period_key;
  }
  if (p.period_type === 'month') {
    const m = /^(\d{4})-(\d{2})$/.exec(p.period_key);
    return m ? `${m[1].slice(2)}/${m[2]}` : p.period_key;
  }
  return p.period_key;
}

function periodFullLabel(p) {
  if (p.period_type === 'week') return `${p.period_key}（${p.start_date.slice(5)} ~ ${p.end_date.slice(5)}）`;
  if (p.period_type === 'month') {
    const m = /^(\d{4})-(\d{2})$/.exec(p.period_key);
    return m ? `${m[1]}年 ${parseInt(m[2])}月` : p.period_key;
  }
  return p.period_key;
}

function renderGanttSidebar() {
  const el = document.getElementById('sidebar-gantt');
  const countEl = document.getElementById('gantt-count');
  if (!el) return;

  const todayStr = offsetDate(new Date(), 0);
  const today = new Date(todayStr).getTime();

  // 过滤：已结束 / expired 不再展示
  const visible = (allFutureEvents || []).filter(f => {
    if (f.review_status === 'expired') return false;
    const endStr = f.expected_end_time ? f.expected_end_time.slice(0, 10) : f.expected_time.slice(0, 10);
    return new Date(endStr).getTime() >= today;
  });

  if (countEl) {
    countEl.style.display = visible.length ? 'inline-block' : 'none';
    countEl.textContent = visible.length;
  }

  if (!visible.length) {
    el.innerHTML = '<div class="gantt-empty">暂无未来事件</div>';
    return;
  }

  const certPenalty = { high: 0, medium: 100, low: 300 };
  const DAY = 86400000;

  function urgencyScore(f) {
    const start = new Date(f.expected_time.slice(0, 10)).getTime();
    const end   = f.expected_end_time ? new Date(f.expected_end_time.slice(0, 10)).getTime() : start;
    const cert  = certPenalty[f.certainty] ?? 200;
    const timeFactor = today >= start
      ? Math.round((end - today) / DAY)
      : Math.round((start - today) / DAY);
    return cert + timeFactor;
  }

  const sorted = visible.sort((a, b) => urgencyScore(a) - urgencyScore(b));

  el.innerHTML = sorted.map(f => {
    const startStr = f.expected_time.slice(0, 10);
    const endStr = f.expected_end_time ? f.expected_end_time.slice(0, 10) : '';
    const start = new Date(startStr).getTime();
    const end = endStr ? new Date(endStr).getTime() : start;
    const hasRange = endStr && endStr !== startStr;
    const certaintyColor = f.certainty === 'high' ? '#22c55e' : f.certainty === 'medium' ? '#eab308' : '#94a3b8';
    let barHtml = '';
    if (hasRange) {
      const total = end - start;
      const elapsed = today - start;
      const pct = Math.max(0, Math.min(100, Math.round(elapsed / total * 100)));
      const statusLabel = today < start ? '未开始' : today > end ? '已结束' : `${pct}%`;
      barHtml = `
        <div class="gantt-bar-row">
          <div class="gantt-bar-wrap">
            <div class="gantt-bar-fill" style="width:${pct}%;background:${certaintyColor}77"></div>
            ${today >= start && today <= end ? `<div class="gantt-bar-today" style="left:${pct}%"></div>` : ''}
          </div>
          <div class="gantt-bar-pct">${statusLabel}</div>
        </div>
        <div class="gantt-date-range">${startStr} ~ ${endStr.slice(5)}</div>
      `;
    } else {
      barHtml = `<div class="gantt-date-range">📅 ${startStr}</div>`;
    }
    return `
      <div class="gantt-item" data-gf="${encodeURIComponent(JSON.stringify(f))}" onmouseenter="showGanttTooltip(this)" onmouseleave="hideGanttTooltip()">
        <div class="gantt-item-header">
          <span style="font-size:9px;padding:1px 5px;border-radius:6px;background:${certaintyColor}22;color:${certaintyColor}">${f.event_type}</span>
          <span class="gantt-item-title">${f.title}</span>
        </div>
        ${barHtml}
      </div>
    `;
  }).join('');
}

function renderSidebar() {
  if (!timelineData) return;
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  [...timelineData.nodes].reverse().forEach(node => {
    const meta = node.snapshot ? (STAGE_META[node.snapshot.market_stage] || STAGE_META.UNKNOWN) : null;
    const el = document.createElement('div');
    el.className = `date-item${node.date === timelineData.today ? ' today' : ''}${node.date === selectedDate ? ' selected' : ''}`;
    el.dataset.date = node.date;
    el.innerHTML = `
      <span class="di-dot" style="background:${meta ? meta.color : '#475569'}"></span>
      ${node.date}
      ${node.future_items.length ? '🔔' : ''}
    `;
    el.onclick = () => selectNode(node.date);
    list.appendChild(el);
  });
}

function renderPeriodSidebar() {
  if (!periodTimelineData) return;
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  [...periodTimelineData.periods].reverse().forEach(p => {
    const c = scoreColor(p.avg_score);
    const el = document.createElement('div');
    el.className = `date-item${p.is_current ? ' today' : ''}${p.period_key === selectedPeriodKey ? ' selected' : ''}`;
    el.dataset.date = p.period_key;
    el.innerHTML = `
      <span class="di-dot" style="background:${c}"></span>
      ${periodLabel(p)} <span style="margin-left:auto;color:#64748b;font-size:11px">${p.operations_count}笔</span>
    `;
    el.onclick = () => selectPeriod(p.period_key);
    list.appendChild(el);
  });
}

function renderTimeline() {
  if (!timelineData) return;
  const tl = document.getElementById('timeline');
  // 清除旧节点（保留 axis）
  [...tl.children].forEach(c => { if (!c.classList.contains('tl-axis')) c.remove(); });

  timelineData.nodes.forEach((node, idx) => {
    const snap = node.snapshot;
    const meta = snap ? (STAGE_META[snap.market_stage] || STAGE_META.UNKNOWN) : { color: '#475569', label: '—' };
    const isToday = node.date === timelineData.today;
    const isFuture = node.is_future;
    const hasFuture = node.future_items.length > 0;

    const wrap = document.createElement('div');
    wrap.className = 'tl-node-wrap';
    wrap.dataset.date = node.date;
    wrap.dataset.stage = snap?.market_stage || '';
    wrap.dataset.future = isFuture ? '1' : '0';
    wrap.onclick = () => selectNode(node.date);

    // shape
    let shapeHtml;
    if (isFuture) {
      shapeHtml = `<div class="tl-shape"><div class="shape-triangle" style="border-bottom-color:${meta.color}"></div></div>`;
    } else if (isToday) {
      shapeHtml = `<div class="tl-shape today-shape" style="color:${meta.color}"><div class="shape-diamond" style="border-color:${meta.color}"></div></div>`;
    } else {
      shapeHtml = `<div class="tl-shape"><div class="shape-circle" style="border-color:${meta.color}"></div></div>`;
    }

    // card content
    const eventsHtml = snap?.core_events?.slice(0,2).map(e =>
      `<div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e}</div>`
    ).join('') || '';

    const cardContent = snap ? `
      <div class="card-date">
        ${node.date}${isToday ? ' <b style="color:var(--accent)">今天</b>' : ''}
        ${hasFuture ? `<span class="bell">🔔${node.future_items.length}</span>` : ''}
      </div>
      <div class="card-stage" style="color:${meta.color}">${meta.label}</div>
      <div class="emotion-bar"><div class="emotion-fill" style="width:${snap.emotion_score}%;background:${meta.color}"></div></div>
      <div class="card-meta">
        <span class="badge">情绪 ${snap.emotion_score}</span>
        <span class="badge">${snap.risk_level}</span>
        <span class="badge">${Math.round(snap.position_min*100)}-${Math.round(snap.position_max*100)}%</span>
      </div>
      <div class="card-events">${eventsHtml}</div>
    ` : `
      <div class="card-date">${node.date}</div>
      <div class="card-stage" style="color:#3b82f6">未来节点</div>
      ${node.future_items.slice(0,2).map(f => `<div class="card-events">🔔 ${f.title}</div>`).join('')}
    `;

    wrap.innerHTML = `
      <div class="tl-card${isToday?' today-card':''}${isFuture?' future-card':''}">${cardContent}</div>
      <div class="tl-connector">
        <div class="tl-connector-line"></div>
        ${shapeHtml}
      </div>
      <div class="tl-card" style="visibility:hidden"></div>
    `;
    tl.appendChild(wrap);
  });
}

function renderPeriodTimeline() {
  if (!periodTimelineData) return;
  const tl = document.getElementById('timeline');
  [...tl.children].forEach(c => { if (!c.classList.contains('tl-axis')) c.remove(); });

  periodTimelineData.periods.forEach(p => {
    const c = scoreColor(p.avg_score);
    const isCurrent = p.is_current;
    const isFuture = p.is_future;
    const isEmpty = !p.operations_count;

    const wrap = document.createElement('div');
    wrap.className = `tl-node-wrap period-node${p.period_type === 'month' ? ' month-node' : ''}`;
    wrap.dataset.date = p.period_key;
    wrap.dataset.future = isFuture ? '1' : '0';
    wrap.onclick = () => selectPeriod(p.period_key);

    const shapeHtml = `<div class="tl-shape" style="color:${c}">
      <div class="period-shape${p.period_type === 'month' ? ' month' : ''}${isCurrent ? ' is-current' : ''}" style="border-color:${c}"></div>
    </div>`;

    const winRateStr = p.win_rate != null ? Math.round(p.win_rate * 100) + '%' : '—';

    const cardContent = `
      <div class="pc-header">
        <div class="pc-key">
          ${periodLabel(p)}
          <span class="pc-sub">${p.start_date.slice(5)}~${p.end_date.slice(5)}</span>
          ${isCurrent ? ' <b style="color:var(--accent);font-size:11px">本' + VIEW_LABEL[p.period_type] + '</b>' : ''}
        </div>
        <div class="pc-score" style="color:${c}">${p.avg_score || '—'}</div>
      </div>
      <div class="pc-bar"><div class="pc-bar-fill" style="width:${p.avg_score}%;background:${c}"></div></div>
      <div class="pc-meta">
        <span class="badge">${p.operations_count} 笔</span>
        <span class="badge">活跃 ${p.active_days} 天</span>
        <span class="badge">契合 ${p.baseline_alignment}%</span>
        <span class="badge">胜率 ${winRateStr}</span>
      </div>
      ${p.narrative ? `<div class="pc-narrative">${p.narrative}</div>` : ''}
    `;

    wrap.innerHTML = `
      <div class="tl-card period-card${isCurrent ? ' today-card' : ''}${isFuture ? ' future-card is-future' : ''}${isEmpty ? ' is-empty' : ''}">${cardContent}</div>
      <div class="tl-connector">
        <div class="tl-connector-line"></div>
        ${shapeHtml}
      </div>
      <div class="tl-card" style="visibility:hidden"></div>
    `;
    tl.appendChild(wrap);
  });
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tl-node-wrap').forEach(wrap => {
    const stage = wrap.dataset.stage;
    const isFuture = wrap.dataset.future === '1';
    let show = true;
    if (filter === 'all') show = true;
    else if (filter === 'future') show = isFuture;
    else show = stage === filter;
    wrap.classList.toggle('filtered', !show);
  });
}

async function selectNode(date) {
  selectedDate = date;

  // 侧边日期列表高亮
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.date === date);
  });

  // 时间轴聚光灯效果
  const timeline = document.getElementById('timeline');
  timeline.classList.add('has-selection');
  document.querySelectorAll('.tl-node-wrap').forEach(wrap => {
    const isActive = wrap.dataset.date === date;
    wrap.classList.toggle('active-node', isActive);
    if (isActive) {
      // 横向精确滚动：让选中节点居于 #timeline-wrap 可见区域水平正中
      setTimeout(() => {
        const container = document.getElementById('timeline-wrap');
        const wrapLeft = wrap.offsetLeft;
        const wrapW    = wrap.offsetWidth;
        const containerW = container.clientWidth;
        const target = wrapLeft - (containerW / 2) + (wrapW / 2);
        container.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
      }, 60);
    }
  });

  document.getElementById('detail').classList.add('open');
  document.getElementById('detail-date').textContent = date;
  document.getElementById('detail-body').innerHTML = '<div class="empty-hint">加载中...</div>';

  const [snapRes, inputsRes, opsRes, dailyRes] = await Promise.all([
    fetch(`/api/baseline/snapshot?date=${date}`),
    fetch(`/api/baseline/inputs?date=${date}`),
    fetch(`/api/review/operations?date=${date}`),
    fetch(`/api/review/daily?date=${date}`),
  ]);

  const snap = snapRes.ok ? await snapRes.json() : null;
  const inputs = inputsRes.ok ? await inputsRes.json() : [];
  const operations = opsRes.ok ? await opsRes.json() : [];
  const dailyReview = dailyRes.ok ? await dailyRes.json() : null;
  const futureNode = timelineData?.nodes.find(n => n.date === date);

  // 拉取每个 operation 的 evaluation
  const evalMap = {};
  await Promise.all((operations || []).map(async op => {
    const r = await fetch(`/api/review/operation/${op.id}`);
    if (r.ok) {
      const d = await r.json();
      evalMap[op.id] = d.evaluations || [];
    }
  }));

  renderDetail(date, snap, inputs, futureNode?.future_items || [], futureNode, operations, dailyReview, evalMap);
}

function renderDetail(date, snap, inputs, futureItems, futureNode, operations, dailyReview, evalMap) {
  operations = operations || [];
  evalMap = evalMap || {};
  const body = document.getElementById('detail-body');
  if (!snap && !inputs.length && !futureItems.length) {
    body.innerHTML = '<div class="empty-hint">暂无数据</div>';
    return;
  }

  const meta = snap ? (STAGE_META[snap.market_stage] || STAGE_META.UNKNOWN) : null;

  const stageHtml = snap ? `
    <div class="detail-section">
      <div class="detail-section-title">市场阶段</div>
      <div class="detail-stage-badge" style="color:${meta.color};border-color:${meta.color}44;background:${meta.bg}">
        <span style="width:8px;height:8px;border-radius:50%;background:${meta.color};display:inline-block"></span>
        ${meta.label}
      </div>
    </div>
  ` : '';

  const emotionHtml = snap ? `
    <div class="detail-section">
      <div class="detail-section-title">情绪指数</div>
      <div class="emotion-row">
        <div class="emotion-num" style="color:${meta.color}">${snap.emotion_score}</div>
        <div class="emotion-track"><div class="emotion-progress" style="width:${snap.emotion_score}%;background:${meta.color}"></div></div>
        <div class="emotion-label">/100</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="risk-badge risk-${snap.risk_level}">${snap.risk_level}</span>
        <span style="font-size:12px;color:var(--muted)">建议仓位</span>
        <span class="pos-label">${Math.round(snap.position_min*100)}% – ${Math.round(snap.position_max*100)}%</span>
      </div>
    </div>
  ` : '';

  const summaryHtml = snap?.action_summary ? `
    <div class="detail-section">
      <div class="detail-section-title">操作建议</div>
      <div class="action-summary-box">${snap.action_summary}</div>
    </div>
  ` : '';

  const eventsHtml = snap?.core_events?.length ? `
    <div class="detail-section">
      <div class="detail-section-title">核心事件</div>
      <ul class="event-list">
        ${snap.core_events.map(e => `<li class="event-item">${e}</li>`).join('')}
      </ul>
    </div>
  ` : '';

  const stylesHtml = (snap?.preferred_styles?.length || snap?.avoid_styles?.length) ? `
    <div class="detail-section">
      <div class="detail-section-title">风格偏好</div>
      <div class="style-chips">
        ${(snap.preferred_styles||[]).map(s=>`<span class="style-chip chip-prefer">↑ ${s}</span>`).join('')}
        ${(snap.avoid_styles||[]).map(s=>`<span class="style-chip chip-avoid">↓ ${s}</span>`).join('')}
      </div>
    </div>
  ` : '';

  // 进行中的未来事件（当天处于事件时间范围内）
  const activeEvents = futureNode?.active_events || [];
  const activeHtml = activeEvents.length ? `
    <div class="detail-section">
      <div class="detail-section-title">📌 当日进行中的事件</div>
      <ul class="future-list">
        ${activeEvents.map(f => {
          const start = f.expected_time.slice(0,10);
          const end = f.expected_end_time ? f.expected_end_time.slice(0,10) : start;
          const hasRange = end !== start;
          let progressHtml = '';
          if (hasRange) {
            const startMs = new Date(start).getTime();
            const endMs = new Date(end).getTime();
            const dateMs = new Date(date).getTime();
            const total = endMs - startMs;
            const elapsed = Math.min(dateMs - startMs, total);
            const pct = total > 0 ? Math.round(elapsed / total * 100) : 0;
            const daysTotal = Math.round(total / 86400000);
            const daysIn = Math.round(elapsed / 86400000);
            progressHtml = `
              <div class="ae-range">📅 ${start} ~ ${end}（共 ${daysTotal} 天）</div>
              <div class="ae-progress-wrap">
                <div class="ae-progress-fill" style="width:${pct}%"></div>
                <div class="ae-progress-today" style="left:${pct}%"></div>
              </div>
              <div class="ae-progress-label">
                <span>开始</span>
                <span>第 ${daysIn} 天 / ${pct}%</span>
                <span>结束</span>
              </div>
            `;
          } else {
            progressHtml = `<div class="ae-range">📅 ${start}</div>`;
          }
          const certaintyColor = f.certainty === 'high' ? '#22c55e' : f.certainty === 'medium' ? '#eab308' : '#94a3b8';
          return `
            <li class="active-event-item">
              <div class="ae-badge" style="background:${certaintyColor}22;color:${certaintyColor}">
                ${f.event_type} · ${f.certainty === 'high' ? '高确定性' : f.certainty === 'medium' ? '中确定性' : '低确定性'}
              </div>
              <div class="ae-title">${f.title}</div>
              ${progressHtml}
            </li>
          `;
        }).join('')}
      </ul>
    </div>
  ` : '';

  // 即将到来的未来事件（未来 7 天内）—— 已结束的不再展示
  const todayKey = (timelineData && timelineData.today) || offsetDate(new Date(), 0);
  const todayMs = new Date(todayKey).getTime();
  const visibleFutures = (futureItems || []).filter(f => {
    if (f.review_status === 'expired') return false;
    const endStr = f.expected_end_time ? f.expected_end_time.slice(0,10) : f.expected_time.slice(0,10);
    return new Date(endStr).getTime() >= todayMs;
  });
  const futureHtml = visibleFutures.length ? `
    <div class="detail-section">
      <div class="detail-section-title">🔔 近期观察项</div>
      <ul class="future-list">
        ${visibleFutures.map(f => {
          const start = f.expected_time.slice(0,10);
          const end = f.expected_end_time ? f.expected_end_time.slice(0,10) : '';
          const rangeStr = end && end !== start ? `${start} ~ ${end.slice(5)}` : start;
          const certaintyColor = f.certainty === 'high' ? '#22c55e' : f.certainty === 'medium' ? '#eab308' : '#94a3b8';
          return `
            <li class="future-item">
              <div class="fi-header">
                <span class="src-badge" style="border-color:${certaintyColor}44;color:${certaintyColor}">${f.certainty === 'high' ? '高确定' : f.certainty === 'medium' ? '中确定' : '低确定'}</span>
                <span class="src-badge">${f.event_type}</span>
              </div>
              <div class="fi-title">${f.title}</div>
              <div class="fi-range">📅 ${rangeStr}</div>
            </li>
          `;
        }).join('')}
      </ul>
    </div>
  ` : '';

  const watchHtml = '';

  const renderInputItem = inp => `
    <li class="input-item"
        data-inp="${encodeURIComponent(JSON.stringify(inp))}"
        onmouseenter="showInputTooltip(this)"
        onmouseleave="hideInputTooltip()">
      <div class="input-meta">
        <span class="src-badge">${inp.source}</span>
        <span class="src-badge">${inp.data_type}</span>
        <span class="src-badge">conf ${(inp.confidence*100).toFixed(0)}%</span>
      </div>
      <div class="input-title">${inp.title}</div>
    </li>`;

  const inputsHtml = inputs.length ? `
    <div class="detail-section">
      <div class="detail-section-title">原子输入 (${inputs.length})</div>
      <ul class="input-list" id="input-list-ul">
        ${inputs.slice(0, 8).map(renderInputItem).join('')}
        ${inputs.length > 8 ? `
          <li id="input-show-more"
              style="text-align:center;padding:7px 0;cursor:pointer;color:var(--accent);font-size:12px;border-radius:5px;background:var(--bg3)"
              onclick="expandInputList(${JSON.stringify(inputs.map(i => encodeURIComponent(JSON.stringify(i))))})">
            ▾ 展开查看全部 ${inputs.length} 条
          </li>` : ''}
      </ul>
    </div>
  ` : '';

  // ── 复盘相关：操作 / 评估 / 日度汇总 ──
  const DIRECTION_LABEL = { buy:'买入', sell:'卖出', add:'加仓', reduce:'减仓', hold:'持有', observe:'观望', plan:'计划' };
  const DIRECTION_COLOR = { buy:'#22c55e', add:'#16a34a', sell:'#ef4444', reduce:'#f97316', hold:'#94a3b8', observe:'#64748b', plan:'#3b82f6' };
  const VERDICT_LABEL = { excellent:'优秀', good:'良好', neutral:'中性', poor:'欠佳', bad:'糟糕' };
  const VERDICT_COLOR = { excellent:'#22c55e', good:'#84cc16', neutral:'#eab308', poor:'#f97316', bad:'#ef4444' };
  const EMOTION_LABEL = { calm:'冷静', confident:'自信', excited:'兴奋', fomo:'FOMO', greedy:'贪婪', fearful:'恐惧', panic:'恐慌', regret:'后悔', revenge:'报复' };
  const RATIONALE_LABEL = { technical:'技术面', fundamental:'基本面', news:'消息面', baseline:'基于Baseline', emotion:'情绪驱动', impulsive:'上头', system:'系统化', mixed:'混合' };

  const opsHtml = operations.length ? `
    <div class="detail-section">
      <div class="detail-section-title">📓 我的操作 (${operations.length})</div>
      <ul class="op-list">
        ${operations.map(op => {
          const evals = evalMap[op.id] || [];
          const latestEval = evals[evals.length - 1];
          const dirColor = DIRECTION_COLOR[op.direction] || '#94a3b8';
          const dirLabel = DIRECTION_LABEL[op.direction] || op.direction;
          const amountStr = op.amount != null ? `¥${op.amount.toLocaleString()}` : '';
          return `
            <li class="op-item"
                data-op="${encodeURIComponent(JSON.stringify({ op, evals }))}"
                onmouseenter="showOpTooltip(this)"
                onmouseleave="hideOpTooltip()">
              <div class="op-header">
                <span class="op-dir" style="background:${dirColor}22;color:${dirColor}">${dirLabel}</span>
                <span class="op-symbol">${op.name} <span style="color:var(--muted);font-size:11px">${op.symbol}</span></span>
                ${latestEval ? `<span class="op-score" style="background:${VERDICT_COLOR[latestEval.verdict]}22;color:${VERDICT_COLOR[latestEval.verdict]}">${latestEval.score}分 · ${VERDICT_LABEL[latestEval.verdict]}</span>` : '<span class="op-score" style="background:var(--bg3);color:var(--muted)">未评估</span>'}
              </div>
              <div class="op-meta">
                ${op.quantity != null ? `<span>${op.quantity}股 @ ¥${op.price ?? '—'}</span>` : ''}
                ${amountStr ? `<span>${amountStr}</span>` : ''}
                <span>${EMOTION_LABEL[op.emotion_state] || op.emotion_state}</span>
                <span>${RATIONALE_LABEL[op.rationale_type] || op.rationale_type}</span>
                ${op.linked_baseline_stage ? `<span class="op-stage" title="操作时大盘阶段">📍 ${(STAGE_META[op.linked_baseline_stage] || {}).label || op.linked_baseline_stage}</span>` : ''}
              </div>
              <div class="op-rationale">${op.rationale}</div>
            </li>
          `;
        }).join('')}
      </ul>
    </div>
  ` : '';

  let dailyHtml = '';
  if (dailyReview && dailyReview.operations_count > 0) {
    const winRate = dailyReview.win_rate != null ? Math.round(dailyReview.win_rate * 100) + '%' : '—';
    const alignment = dailyReview.baseline_alignment;
    const alignmentColor = alignment >= 70 ? '#22c55e' : alignment >= 40 ? '#eab308' : '#ef4444';

    const emotionTop = Object.entries(dailyReview.emotion_distribution || {})
      .filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const rationaleTop = Object.entries(dailyReview.rationale_distribution || {})
      .filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]).slice(0, 3);

    dailyHtml = `
      <div class="detail-section">
        <div class="detail-section-title">📊 日度复盘评分</div>
        <div class="review-stat-grid">
          <div class="review-stat"><div class="rs-label">综合评分</div><div class="rs-value">${dailyReview.avg_score || 0}</div></div>
          <div class="review-stat"><div class="rs-label">胜率</div><div class="rs-value">${winRate}</div></div>
          <div class="review-stat"><div class="rs-label">Baseline契合度</div><div class="rs-value" style="color:${alignmentColor}">${alignment}%</div></div>
          <div class="review-stat"><div class="rs-label">操作笔数</div><div class="rs-value">${dailyReview.operations_count}</div></div>
        </div>
        ${dailyReview.mood_summary ? `<div class="review-mood">💭 ${dailyReview.mood_summary}</div>` : ''}
        <div class="review-dist">
          <div class="rd-row"><b>情绪：</b>${emotionTop.map(([k, v]) => `<span class="rd-tag">${EMOTION_LABEL[k] || k} ×${v}</span>`).join('') || '—'}</div>
          <div class="rd-row"><b>依据：</b>${rationaleTop.map(([k, v]) => `<span class="rd-tag">${RATIONALE_LABEL[k] || k} ×${v}</span>`).join('') || '—'}</div>
        </div>
      </div>

      ${(dailyReview.key_takeaways?.length || dailyReview.mistakes?.length) ? `
      <div class="detail-section">
        <div class="detail-section-title">📝 收获与错误</div>
        ${dailyReview.key_takeaways?.length ? `
          <div class="review-block">
            <div class="rb-title" style="color:#22c55e">✅ 关键收获</div>
            <ul class="rb-list">${dailyReview.key_takeaways.map(s => `<li>${s}</li>`).join('')}</ul>
          </div>` : ''}
        ${dailyReview.mistakes?.length ? `
          <div class="review-block">
            <div class="rb-title" style="color:#f97316">⚠️ 主要错误</div>
            <ul class="rb-list">${dailyReview.mistakes.map(s => `<li>${s}</li>`).join('')}</ul>
          </div>` : ''}
      </div>` : ''}

      ${dailyReview.next_actions?.length ? `
      <div class="detail-section">
        <div class="detail-section-title">🎯 后续计划</div>
        <ul class="rb-list" style="padding-left:18px">${dailyReview.next_actions.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>` : ''}
    `;
  }

  const btnHtml = `
    <div class="detail-section">
      <button class="detail-btn" id="reaggregate-btn" onclick="reaggregate('${date}')">
        ↻ 重新聚合
      </button>
    </div>
  `;

  body.innerHTML = stageHtml + emotionHtml + summaryHtml + eventsHtml + stylesHtml + activeHtml + futureHtml + opsHtml + dailyHtml + inputsHtml + btnHtml;
}

async function reaggregate(date) {
  const btn = document.getElementById('reaggregate-btn');
  if (btn) { btn.textContent = '聚合中...'; btn.classList.add('loading'); }
  await fetch(`/api/baseline/aggregate/${date}`, { method: 'POST' });
  await loadTimeline();
  await selectNode(date);
}

function expandInputList(encodedList) {
  const ul = document.getElementById('input-list-ul');
  const btn = document.getElementById('input-show-more');
  if (!ul || !btn) return;
  // 追加剩余 items（从第9条开始）
  const allItems = encodedList.slice(8).map(enc => {
    let inp; try { inp = JSON.parse(decodeURIComponent(enc)); } catch(e) { return ''; }
    return `<li class="input-item"
        data-inp="${enc}"
        onmouseenter="showInputTooltip(this)"
        onmouseleave="hideInputTooltip()">
      <div class="input-meta">
        <span class="src-badge">${inp.source}</span>
        <span class="src-badge">${inp.data_type}</span>
        <span class="src-badge">conf ${(inp.confidence*100).toFixed(0)}%</span>
      </div>
      <div class="input-title">${inp.title}</div>
    </li>`;
  }).join('');
  btn.insertAdjacentHTML('beforebegin', allItems);
  btn.remove();
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  selectedDate = null;
  selectedPeriodKey = null;
  document.querySelectorAll('.date-item').forEach(el => el.classList.remove('selected'));
  // 取消聚光灯
  document.getElementById('timeline').classList.remove('has-selection');
  document.querySelectorAll('.tl-node-wrap').forEach(wrap => wrap.classList.remove('active-node'));
}

/* ─────────────────────────────────────────────
 * 周 / 月 复盘：选中节点 + 详情渲染
 * ───────────────────────────────────────────── */

async function selectPeriod(periodKey) {
  selectedPeriodKey = periodKey;

  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.date === periodKey);
  });

  const timeline = document.getElementById('timeline');
  timeline.classList.add('has-selection');
  document.querySelectorAll('.tl-node-wrap').forEach(wrap => {
    const isActive = wrap.dataset.date === periodKey;
    wrap.classList.toggle('active-node', isActive);
    if (isActive) {
      setTimeout(() => {
        const container = document.getElementById('timeline-wrap');
        const wrapLeft = wrap.offsetLeft;
        const wrapW = wrap.offsetWidth;
        const containerW = container.clientWidth;
        const target = wrapLeft - (containerW / 2) + (wrapW / 2);
        container.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
      }, 60);
    }
  });

  document.getElementById('detail').classList.add('open');
  const p = periodTimelineData.periods.find(x => x.period_key === periodKey);
  document.getElementById('detail-date').textContent = p ? periodFullLabel(p) : periodKey;
  document.getElementById('detail-body').innerHTML = '<div class="empty-hint">加载中...</div>';

  const path = viewMode === 'week' ? 'weekly' : 'monthly';
  const [reviewRes, insightRes, childRes, journalRes] = await Promise.all([
    fetch(`/api/review/${path}?period=${encodeURIComponent(periodKey)}`),
    fetch(`/api/review/${path}/${encodeURIComponent(periodKey)}/insights`),
    fetch(`/api/review/${path}/${encodeURIComponent(periodKey)}/children`),
    fetch(`/api/review/journals?scope=${viewMode}&period_key=${encodeURIComponent(periodKey)}`),
  ]);
  const review = reviewRes.ok ? await reviewRes.json() : null;
  const insight = insightRes.ok ? await insightRes.json() : null;
  const children = childRes.ok ? await childRes.json() : [];
  const journals = journalRes.ok ? (await journalRes.json()).items || [] : [];
  renderPeriodDetail(review, insight, children, journals);
}

function renderPeriodDetail(review, insight, children, journals) {
  journals = journals || [];
  const body = document.getElementById('detail-body');
  if (!review) {
    body.innerHTML = '<div class="empty-hint">暂无数据</div>';
    return;
  }

  const EMOTION_LABEL = { calm:'冷静', confident:'自信', excited:'兴奋', fomo:'FOMO', greedy:'贪婪', fearful:'恐惧', panic:'恐慌', regret:'后悔', revenge:'报复' };
  const RATIONALE_LABEL = { technical:'技术面', fundamental:'基本面', news:'消息面', baseline:'基于Baseline', emotion:'情绪驱动', impulsive:'上头', system:'系统化', mixed:'混合' };

  const c = scoreColor(review.avg_score);
  const winRate = review.win_rate != null ? Math.round(review.win_rate * 100) + '%' : '—';
  const stageTop = Object.entries(review.stage_distribution || {})
    .filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]).slice(0, 3);

    .filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]).slice(0, 3);

  const summaryHtml = `

      </div>
    </div>
  `;

  // 历史模式洞察卡片
  let insightHtml = '';
  if (insight && (insight.compared_keys.length > 0 || insight.score_trend.length > 0)) {
    const trends = insight.score_trend.concat([review.avg_score || 0]);
    const max = Math.max(...trends, 1);
    const trendBars = trends.map((v, i) => {
      const isCurrent = i === trends.length - 1;
      const h = Math.max(2, Math.round(v / max * 32));
      const labelKey = isCurrent ? '本期' : (insight.compared_keys[i] || '').replace(/^\d{4}-/, '');
      return `<div class="ic-trend-bar${isCurrent ? ' current' : ''}" style="height:${h}px" title="${labelKey}: ${v}"></div>`;
    }).join('');

    const hasContent = insight.recurring_mistakes.length || insight.recurring_strengths.length

      || insight.alignment_warnings.length;

    insightHtml = `
      <div class="insight-card">
        <div class="ic-title">🧠 历史模式洞察 <span style="margin-left:auto;color:var(--muted);font-size:10px;font-weight:400">对比近 ${insight.compared_keys.length} 期</span></div>

          <ul class="ic-warn-list">${insight.recurring_mistakes.map(s => `<li>${s}</li>`).join('')}</ul>
        ` : ''}

        ${insight.recurring_strengths.length ? `
          <div class="ic-section-title">✅ 反复体现的优势</div>

        ` : ''}

        ${insight.emotion_warnings.length ? `
          <div class="ic-section-title">😰 情绪警示</div>
          <ul class="ic-warn-list">${insight.emotion_warnings.map(s => `<li>${s}</li>`).join('')}</ul>

      </div>

  } else if (insight) {

  // 文字内容区块（可编辑）
  const textBlocksHtml = `

      <div class="detail-section-title">📝 ${VIEW_LABEL[review.period_type]}度复盘内容</div>

      ${(review.key_takeaways && review.key_takeaways.length) ? `

          <div class="rb-title" style="color:#22c55e">✅ 关键收获</div>
          <ul class="rb-list">${review.key_takeaways.map(s => `<li>${s}</li>`).join('')}</ul>
        </div>` : ''}
      ${(review.mistakes && review.mistakes.length) ? `
        <div class="review-block">
          <div class="rb-title" style="color:#f97316">⚠️ 主要错误</div>
          <ul class="rb-list">${review.mistakes.map(s => `<li>${s}</li>`).join('')}</ul>
        </div>` : ''}
      ${(review.recurring_mistakes && review.recurring_mistakes.length) ? `
        <div class="review-block">
          <div class="rb-title" style="color:#ef4444">🔁 反复犯的错</div>

      ${(review.pattern_insights && review.pattern_insights.length) ? `
        <div class="review-block">
